<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4天增长运营大师课-demo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app day-page">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="back-link">
                <span>←</span>
                <span>返回路径</span>
            </a>
            
            <div class="day-info">
                <div class="day-badge" id="day-badge">DAY 1</div>
                <div class="day-completion" id="day-completion">0/3 已完成</div>
                <h2 class="day-title" id="day-title">财富思维</h2>
                <p class="day-subtitle" id="day-subtitle">Naval：寻求财富而非金钱</p>
                <div class="day-progress-bar">
                    <div class="day-progress-fill" id="day-progress-fill"></div>
                </div>
            </div>

            <div class="units-section">
                <p class="units-label">当前单元</p>
                <div class="units-list" id="units-list">
                    <!-- Units will be generated by JS -->
                </div>
            </div>

            <div class="other-days">
                <button class="other-days-btn" id="other-days-btn">
                    <span>其他天数</span>
                    <span>▼</span>
                </button>
                <div class="other-days-dropdown" id="other-days-dropdown">
                    <!-- Other days will be generated by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <div class="content-header">
                <div class="unit-meta">
                    <h1 class="unit-title" id="unit-title">早高峰 · 核心概念</h1>
                    <div class="unit-tags">
                        <span class="duration" id="duration">⏱ 10分钟</span>
                        <span class="theme" id="theme">核心概念</span>
                    </div>
                </div>
                <div class="view-toggle">
                    <button class="toggle-btn active" id="brief-btn">
                        <span>⚡ 速览</span>
                    </button>
                    <button class="toggle-btn" id="full-btn">
                        <span>📖 详读</span>
                    </button>
                </div>
            </div>

            <div class="content-card">
                <div class="card-header">
                    <div class="window-dots">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                    </div>
                    <span class="card-label">GROWTH_MASTER_KAWAII_EDITION</span>
                </div>
                <div class="card-body" id="card-body">
                    <!-- Content will be generated by JS -->
                </div>
            </div>

            <div class="navigation">
                <button class="nav-btn" id="prev-btn">
                    <span class="nav-arrow">←</span>
                    <div class="nav-text">
                        <span class="nav-label">上一单元</span>
                        <span class="nav-unit" id="prev-unit">-</span>
                    </div>
                </button>
                <button class="nav-btn" id="next-btn">
                    <div class="nav-text">
                        <span class="nav-label">下一单元</span>
                        <span class="nav-unit" id="next-unit">-</span>
                    </div>
                    <span class="nav-arrow">→</span>
                </button>
            </div>
        </main>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
