<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4天增长运营大师课-demo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="prefetch" href="day.html">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <span class="logo-text">4天增长运营大师课-demo</span>
            </div>
            <div class="header-right">
                <button class="progress-btn">
                    <span>📊</span>
                    <span>My Progress</span>
                </button>
                <div class="avatar">👤</div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Hero Section -->
            <section class="hero">
                <div class="hero-card">
                    <div class="hero-icon">🎓</div>
                    <div class="hero-content">
                        <h1>每天1小时<br>系统掌握增长核心框架</h1>
                        <p class="hero-subtitle">AARRR模型 + 多邻国增长案例 + PMF层级框架（上下篇）</p>
                    </div>
                </div>
                <div class="progress-card">
                    <div class="progress-header">
                        <span id="completed-text">已完成 0/4 天</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-hearts" id="progress-hearts">
                        <span class="heart">🤍</span>
                        <span class="heart">🤍</span>
                        <span class="heart">🤍</span>
                        <span class="heart">🤍</span>
                    </div>
                </div>
            </section>

            <!-- Path Map -->
            <section class="path-map">
                <div class="path-container" id="path-container">
                    <!-- Days will be generated by JS -->
                </div>
            </section>

            <!-- Continue Button -->
            <div class="continue-section">
                <button class="continue-btn" id="continue-btn">
                    CONTINUE LEARNING
                </button>
            </div>
        </main>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
